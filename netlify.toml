[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**/*"]
[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"
[[headers]]
  for = "/*"
  [headers.value]
    Content-Security-Policy = "default-src 'self' privatearea.looking-for-soccer.com"
    Access-Control-Allow-Origin = "privatearea.looking-for-soccer.com"